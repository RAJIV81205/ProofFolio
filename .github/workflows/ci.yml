name: CI

env:
  COMPACT_VERSION: 0.31.1

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  contract-compile:
    name: Compile Compact contract
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Compact compiler
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-installer.sh | sh -s -- --quiet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/compact" update "$COMPACT_VERSION"

      - name: Install dependencies without lockfile
        run: npm install --no-package-lock

      - name: Compile contract
        run: npm run compile

  frontend-typecheck:
    name: Typecheck frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Compact compiler
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/midnightntwrk/compact/releases/download/compact-v0.5.1/compact-installer.sh | sh -s -- --quiet
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/compact" update "$COMPACT_VERSION"

      - name: Install compiler dependencies without lockfile
        run: npm install --no-package-lock

      - name: Generate contract artifacts
        run: npm run compile

      - name: Install frontend dependencies without lockfile
        working-directory: frontend
        run: npm install --no-package-lock

      - name: Typecheck frontend
        working-directory: frontend
        run: npx tsc --noEmit --pretty false
